<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tuntikirjaus Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --blue: #3498db; --red: #e74c3c; }
        
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: #333; line-height: 1.5; }
        
        .container { padding: 15px; max-width: 500px; margin: auto; padding-bottom: 120px; }
        
        /* Yläpaneeli */
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .summary { font-size: 28px; font-weight: bold; color: #f1c40f; margin-top: 5px; }
        
        .profile-bar { margin-bottom: 15px; }
        .profile-bar input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }

        /* Isot hallintanapit */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .action-btn { border: none; padding: 15px 10px; border-radius: 12px; color: white; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-mail { background: var(--blue); }
        .btn-report { background: var(--accent); }

        .month-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; background: white; }

        /* Päiväkortit */
        .day-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid transparent; transition: 0.3s; }
        .day-card.active { border-left-color: var(--accent); background: #fff; }
        
        .day-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .day-date { font-weight: bold; font-size: 18px; }
        .day-total { color: var(--accent); font-weight: bold; background: #e8f5e9; padding: 2px 8px; border-radius: 5px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .input-group { display: flex; flex-direction: column; gap: 3px; }
        label { font-size: 10px; text-transform: uppercase; color: #888; font-weight: bold; letter-spacing: 0.5px; }
        
        input[type="time"], input[type="text"] { 
            padding: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 16px; background: #fafafa; width: 100%; box-sizing: border-box; 
        }
        input:focus { background: white; border-color: var(--blue); outline: none; }

        /* Raportti-näkymä */
        #raportti { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .r-header { display: flex; gap: 10px; margin-bottom: 20px; }
        .r-rivi { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        
        @media print { 
            .no-print { display: none !important; } 
            #raportti { position: relative; display: block; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header">
        <div style="font-size: 12px; opacity: 0.9; letter-spacing: 1px;">KUUKAUDEN TUNNIT</div>
        <div class="summary" id="yhteensaTunnit">0 h 0 min</div>
    </div>

    <div class="profile-bar">
        <input type="text" id="nimi" placeholder="Kirjoita nimesi tähän..." onchange="tallennaProfiili()">
    </div>

    <div class="action-grid">
        <button class="action-btn btn-mail" onclick="lahetaSposti()">📧 LÄHETÄ S-POSTI</button>
        <button class="action-btn btn-report" onclick="naytaRaportti()">📄 AVAA RAPORTTI</button>
    </div>

    <select id="kkValinta" class="month-select" onchange="paivitaNakyma()"></select>

    <div id="paivaLista"></div>
</div>

<div id="raportti">
    <div class="r-header no-print">
        <button onclick="document.getElementById('raportti').style.display='none'" style="flex:1; background:var(--red); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">SULJE</button>
        <button onclick="window.print()" style="flex:1; background:var(--primary); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">TULOSTA PDF</button>
    </div>
    <div id="raporttiSisalto"></div>
</div>

<script>
    // Tallennuslokero
    let tuntiData = JSON.parse(localStorage.getItem('tunnit_v3')) || {};

    const kkNimet = ["Tammikuu","Helmikuu","Maaliskuu","Huhtikuu","Toukokuu","Kesäkuu","Heinäkuu","Elokuu","Syyskuu","Lokakuu","Marraskuu","Joulukuu"];
    const sel = document.getElementById('kkValinta');
    kkNimet.forEach((n,i) => { 
        let o = new Option(n,i); 
        if(i === new Date().getMonth()) o.selected = true; 
        sel.add(o); 
    });

    window.onload = () => {
        document.getElementById('nimi').value = localStorage.getItem('t_nimi') || "";
        paivitaNakyma();
    };

    function tallennaProfiili() {
        localStorage.setItem('t_nimi', document.getElementById('nimi').value);
    }

    function paivitaNakyma() {
        const kk = parseInt(document.getElementById('kkValinta').value);
        const lista = document.getElementById('paivaLista');
        lista.innerHTML = "";
        let kokonaisMinuutit = 0;
        
        // Luodaan päivät valitulle kuukaudelle (vuosi 2026 kuten pyydetty)
        let pvm = new Date(2026, kk, 1);
        while (pvm.getMonth() === kk) {
            const id = pvm.toISOString().split('T')[0];
            if (!tuntiData[id]) tuntiData[id] = { alku: '', loppu: '', paikkaA: '', paikkaL: '' };
            
            const päivänMin = laskeTunnit(tuntiData[id].alku, tuntiData[id].loppu);
            kokonaisMinuutit += päivänMin;

            const div = document.createElement('div');
            div.className = "day-card" + (tuntiData[id].alku ? " active" : "");
            div.innerHTML = `
                <div class="day-header">
                    <div class="day-date">${pvm.getDate()}.${pvm.getMonth()+1}.</div>
                    <div class="day-total">${minuutitTekstiksi(päivänMin)}</div>
                </div>
                <div class="input-grid">
                    <div class="input-group"><label>Aloitus</label><input type="time" value="${tuntiData[id].alku}" onchange="tallenna('${id}', 'alku', this.value)"></div>
                    <div class="input-group"><label>Lopetus</label><input type="time" value="${tuntiData[id].loppu}" onchange="tallenna('${id}', 'loppu', this.value)"></div>
                </div>
                <div class="input-grid">
                    <div class="input-group"><label>Mistä</label><input type="text" placeholder="Paikka" value="${tuntiData[id].paikkaA}" onchange="tallenna('${id}', 'paikkaA', this.value)"></div>
                    <div class="input-group"><label>Mihin</label><input type="text" placeholder="Paikka" value="${tuntiData[id].paikkaL}" onchange="tallenna('${id}', 'paikkaL', this.value)"></div>
                </div>
            `;
            lista.appendChild(div);
            pvm.setDate(pvm.getDate() + 1);
        }
        document.getElementById('yhteensaTunnit').textContent = minuutitTekstiksi(kokonaisMinuutit);
    }

    function tallenna(id, k, v) {
        tuntiData[id][k] = v;
        localStorage.setItem('tunnit_v3', JSON.stringify(tuntiData));
        paivitaNakyma();
    }

    function laskeTunnit(a, l) {
        if (!a || !l) return 0;
        const [h1, m1] = a.split(':').map(Number);
        const [h2, m2] = l.split(':').map(Number);
        let min = (h2 * 60 + m2) - (h1 * 60 + m1);
        return min < 0 ? min + 1440 : min; // Huomioi vuorokauden vaihtumisen
    }

    function minuutitTekstiksi(m) {
        const h = Math.floor(m / 60);
        const min = m % 60;
        return h + " h " + min + " min";
    }

    function lahetaSposti() {
        const nimi = localStorage.getItem('t_nimi') || "Työntekijä";
        const kk = kkNimet[document.getElementById('kkValinta').value];
        let body = `TUNTIRAPORTTI: ${nimi}\nKuukausi: ${kk}\n--------------------------\n\n`;
        
        let loytyiTietoa = false;
        Object.keys(tuntiData).sort().forEach(id => {
            const d = tuntiData[id];
            if(d.alku && d.loppu) {
                loytyiTietoa = true;
                const pvm = id.split('-').reverse().join('.');
                const kesto = minuutitTekstiksi(laskeTunnit(d.alku, d.loppu));
                body += `${pvm}: ${d.alku} - ${d.loppu} (${kesto})\nReitti: ${d.paikkaA} - ${d.paikkaL}\n--------------------------\n`;
            }
        });

        if(!loytyiTietoa) return alert("Ei kirjattuja tunteja tässä kuussa!");

        body += `\nYHTEENSÄ: ${document.getElementById('yhteensaTunnit').textContent}`;
        window.location.href = `mailto:?subject=Tuntiraportti ${nimi} - ${kk}&body=${encodeURIComponent(body)}`;
    }

    function naytaRaportti() {
        const nimi = localStorage.getItem('t_nimi') || "---";
        const kk = kkNimet[document.getElementById('kkValinta').value];
        let html = `<h2 style="margin-bottom:5px;">TUNTIRAPORTTI</h2>
                    <p style="margin-top:0;"><b>Työntekijä:</b> ${nimi}<br><b>Kuukausi:</b> ${kk} 2026</p><hr>`;
        let summa = 0;
        let loytyi = false;

        Object.keys(tuntiData).sort().forEach(id => {
            const d = tuntiData[id];
            // Näytetään vain valitun kuukauden päivät raportissa
            if (d.alku && d.loppu && new Date(id).getMonth() == document.getElementById('kkValinta').value) {
                loytyi = true;
                const m = laskeTunnit(d.alku, d.loppu);
                summa += m;
                const pvm = id.split('-').reverse().join('.');
                html += `<div class="r-rivi">
                            <span><b>${pvm}</b><br><small>${d.paikkaA} - ${d.paikkaL}</small></span>
                            <span style="text-align:right;">${d.alku} - ${d.loppu}<br><b>${minuutitTekstiksi(m)}</b></span>
                         </div>`;
            }
        });

        if(!loytyi) html += "<p>Ei kirjattuja tunteja.</p>";
        
        html += `<h3 style="text-align:right; margin-top:20px; border-top:2px solid #333; padding-top:10px;">YHTEENSÄ: ${minuutitTekstiksi(summa)}</h3>`;
        document.getElementById('raporttiSisalto').innerHTML = html;
        document.getElementById('raportti').style.display = 'block';
    }
</script>
</body>
</html>
